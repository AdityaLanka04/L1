name: Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry cerbylacr \
            --image cerbyl-backend:latest \
            ./backend

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name cerbyl-api \
            --resource-group cerbyl-rg \
            --image cerbylacr.azurecr.io/cerbyl-backend:latest
