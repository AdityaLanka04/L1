worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limits (mirrors Azure config)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/m;

    # ── Load Balancing Split ──────────────────────────────────────────────────
    # 20% of requests go to EC2 local backend, 80% go to Azure.
    # Keyed on remote_addr only → same client IP always hits the same backend
    # (per-user sticky routing). Change weights by adjusting the percentage.
    # * catches the remainder.
    #
    # BEFORE DEPLOYING: replace AZURE_BACKEND_URL with the actual address:
    #   http://<AZURE_VM_PRIVATE_IP>:8000   (Azure NSG must allow port 8000 from EC2 IP)
    #   http://<AZURE_VM_PRIVATE_IP>        (if Azure nginx on port 80 is reachable)
    #
    # Using a bare IP avoids needing a resolver directive. If you use a hostname,
    # add:  resolver 8.8.8.8 8.8.4.4 valid=30s;
    split_clients "${remote_addr}" $lb_backend {
        20%  "http://127.0.0.1:8000";
        *    "AZURE_BACKEND_URL";
    }

    # HTTP → HTTPS redirect
    # BEFORE DEPLOYING: replace EC2_DOMAIN with your actual domain (e.g. api.cerbyl.com)
    server {
        listen 80;
        server_name EC2_DOMAIN;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name EC2_DOMAIN;

        ssl_certificate /etc/letsencrypt/live/EC2_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/EC2_DOMAIN/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # Auth endpoints
        location ~ ^/api/(auth|login|register|token) {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass $lb_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI / heavy endpoints — longer timeout, tighter rate limit
        location ~ ^/api/(agents|get_flashcards|generate|questions|notes) {
            limit_req zone=ai_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass $lb_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # General API + WebSocket upgrade
        location /api {
            limit_req zone=api_limit burst=40 nodelay;
            limit_req_status 429;

            proxy_pass $lb_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket
        location /ws {
            proxy_pass $lb_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend — always served from EC2 local frontend container
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
